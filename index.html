<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Jersey Plan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0D0F13;color:#E8EAF0;min-height:100vh}
.topbar{background:#13161C;border-bottom:1px solid #1E2230;padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;letter-spacing:.04em;color:#E8EAF0;display:flex;align-items:center;gap:8px}
.logo-badge{background:#D4A017;color:#000;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.08em}
.sync-row{display:flex;align-items:center;gap:5px;font-size:11px;color:#6A7080}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2E8B3A;flex-shrink:0}
.sync-dot.saving{background:#BA7517}.sync-dot.syncing{background:#2A6FD4}.sync-dot.error{background:#8A2020}
.mainnav{background:#13161C;border-bottom:1px solid #1E2230;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;position:sticky;top:52px;z-index:90}
.mainnav::-webkit-scrollbar{display:none}
.ntab{padding:13px 13px 11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:#6A7080;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;position:relative}
.ntab:hover{color:#C0C6D4}
.ntab.active{color:#E8EAF0;border-bottom-color:#D4A017}
.gamedot{width:5px;height:5px;border-radius:50%;background:#8A2020;position:absolute;top:7px;right:5px}
.wrap{max-width:680px;margin:0 auto;padding:18px 14px 100px}
/* XP CARD */
.xp-card{background:#13161C;border:1px solid #1E2230;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.xp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.xp-level{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:.06em;color:#D4A017}
.xp-streak{font-size:12px;color:#6A7080;display:flex;align-items:center;gap:4px}
.xp-streak span{color:#E8714A;font-weight:600}
.xp-bar-wrap{background:#0F1117;border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px}
.xp-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#D4A017,#E8C84A);transition:width .4s ease}
.xp-nums{display:flex;justify-content:space-between;font-size:11px;color:#6A7080}
.xp-today{font-size:11px;color:#4ABF6A;font-weight:600}
.day-progress{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #1E2230}
.dp-label{font-size:11px;color:#6A7080;flex-shrink:0}
.dp-dots{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.dp-dot{width:8px;height:8px;border-radius:2px;background:#1E2230;transition:background .2s}
.dp-dot.done{background:#2E8B3A}
.dp-dot.noxp{background:#1E2230;opacity:.4}
.dp-count{font-size:11px;color:#6A7080;flex-shrink:0}
/* SCHEDULE */
.dayname{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:38px;letter-spacing:.02em;line-height:1;color:#E8EAF0}
.daysub{font-size:13px;color:#6A7080;margin-top:4px}
.pill{display:inline-flex;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:3px;margin-top:8px}
.pill-high{background:#2A1008;color:#E8714A;border:1px solid #5A2010}
.pill-medium{background:#1A1508;color:#D4A017;border:1px solid #4A3A08}
.pill-rest{background:#0A1A0A;color:#4ABF6A;border:1px solid #1A4A1A}
.pill-game{background:#2A0808;color:#FF7070;border:1px solid #6A1515}
.banner{margin-top:10px;padding:10px 14px;font-size:12px;line-height:1.6;border-radius:0 6px 6px 0}
.banner-game{background:#200A0A;border-left:3px solid #8A2020;color:#FF9090}
.banner-2ndxv{background:#0A1520;border-left:3px solid #2A5A9A;color:#80B0F0}
.banner-note{background:#0D1520;border-left:3px solid #1A4A8A;color:#80A8E0}
.team-switcher{display:flex;gap:6px;margin-top:14px;margin-bottom:2px}
.ts-btn{flex:1;padding:9px 10px;border-radius:7px;border:1px solid #1E2230;background:#13161C;color:#6A7080;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.ts-btn:hover{border-color:#2A3040;color:#C0C6D4}
.ts-btn.active-1st{border-color:#D4A017;color:#D4A017;background:#1A1508}
.ts-btn.active-2nd{border-color:#2A6FD4;color:#5A9AF0;background:#0D1520}
.timeline{display:flex;flex-direction:column;gap:3px;margin-top:12px}
/* BLOCK */
.block{display:flex;align-items:stretch;border-radius:7px;border:1px solid #1E2230;background:#13161C;transition:border-color .15s,opacity .2s;position:relative}
.block:hover{border-color:#2A3040}
.block.done-block{opacity:.5}
.block.done-block .bname{text-decoration:line-through;color:#4A5060}
.block.no-xp-block{border-style:dashed}
.block.sel{border-color:#2A6FD4;box-shadow:0 0 0 2px rgba(42,111,212,.2)}
.block.tgt{border-color:#0F6E56;box-shadow:0 0 0 2px rgba(15,110,86,.15)}
.baccent{width:3px;flex-shrink:0;border-radius:7px 0 0 7px}
.btimes{min-width:86px;padding:9px 10px;display:flex;flex-direction:column;justify-content:center;gap:1px;border-right:1px solid #1E2230;background:#0F1117;cursor:pointer;flex-shrink:0}
.btimes:hover{background:#13161C}
.tstart{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:#E8EAF0}
.tend{font-size:10px;color:#6A7080}
.tdur{font-size:10px;color:#3A4050;margin-top:1px}
.bbody{padding:9px 12px;flex:1;min-width:0}
.bcat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.bname{font-size:13px;font-weight:500;color:#E8EAF0;line-height:1.3}
.bdetail{font-size:12px;color:#6A7080;margin-top:2px;line-height:1.5}
.bpts-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;margin-top:3px;padding:1px 6px;border-radius:3px}
.bpts-tag.has-xp{background:#1A1508;color:#D4A017;border:1px solid #3A2A08}
.bpts-tag.no-xp{background:#1A1A1A;color:#4A5060;border:1px solid #1E2230}
.bctrls{display:flex;align-items:center;gap:3px;padding:6px 8px;flex-shrink:0}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #2A3040;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:11px;color:transparent}
.chk:hover{border-color:#2E8B3A}
.chk.checked{background:#2E8B3A;border-color:#2E8B3A;color:#fff}
.chk.noxp-chk{border-color:#1E2230}
.chk.noxp-chk:hover{border-color:#4A5060}
.chk.noxp-chk.checked{background:#2A3040;border-color:#2A3040;color:#6A7080}
.cbtn{width:26px;height:26px;border-radius:6px;border:1px solid #1E2230;background:#0F1117;color:#6A7080;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px}
.cbtn:hover{border-color:#2A3040;color:#C0C6D4;background:#13161C}
.cbtn.active{border-color:#2A6FD4;color:#5A9AF0;background:#0D1520}
.cbtn.del:hover{border-color:#6A1515;color:#FF7070;background:#200A0A}
.cbtn.xp-toggle{font-size:11px}
.cbtn.xp-on{border-color:#3A2A08;color:#D4A017;background:#1A1508}
.addbtn{width:100%;margin-top:6px;padding:9px;border:1px dashed #1E2230;border-radius:7px;background:none;color:#6A7080;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.addbtn:hover{border-color:#2A6FD4;color:#5A9AF0;background:#0D1520}
.scisec{margin-top:16px;border-top:1px solid #1E2230;padding-top:14px}
.scititle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:#6A4A0A;margin-bottom:8px}
.sciitem{font-size:12px;color:#6A7080;padding:3px 0 3px 14px;position:relative;line-height:1.5}
.sciitem::before{content:"→";position:absolute;left:0;color:#4A3A08}
.swapbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#13161C;border:1px solid #2A6FD4;border-radius:8px;padding:9px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#6A7080;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:150;white-space:nowrap}
.swapbar strong{color:#E8EAF0}
.swapbar button{padding:4px 10px;border-radius:6px;border:1px solid #1E2230;background:none;color:#6A7080;font-size:11px;cursor:pointer;font-family:inherit}
/* TOAST */
.xp-toast{position:fixed;top:70px;right:16px;background:#1A2A12;border:1px solid #2E8B3A;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:#4ABF6A;z-index:500;animation:toastIn .3s ease,toastOut .3s ease 1.5s forwards;pointer-events:none}
.lvlup-toast{position:fixed;top:70px;right:16px;background:#1A1508;border:1px solid #D4A017;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;color:#D4A017;z-index:500;animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;pointer-events:none;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
/* TIME POPUP */
.tpop{background:#13161C;border:1px solid #2A3040;border-radius:8px;padding:14px;width:220px;box-shadow:0 8px 32px rgba(0,0,0,.6);margin-top:3px}
.tpop h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6A7080;margin-bottom:10px;font-weight:600}
.tprow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tprow label{font-size:12px;color:#6A7080;width:36px;flex-shrink:0}
.tprow input[type=time]{flex:1;font-size:13px;background:#0F1117;border:1px solid #2A3040;border-radius:5px;color:#E8EAF0;padding:5px 8px;font-family:inherit;color-scheme:dark}
.tprow input:focus{outline:none;border-color:#2A6FD4}
.tpacts{display:flex;gap:6px;margin-top:10px}
.tpsave{flex:1;padding:7px;border-radius:5px;border:none;background:#2A6FD4;color:#E8EAF0;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.tpcancel{padding:7px 12px;border-radius:5px;border:1px solid #1E2230;background:none;color:#6A7080;font-size:12px;cursor:pointer;font-family:inherit}
/* PATHWAY */
.p-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;letter-spacing:.02em;color:#E8EAF0;line-height:1}
.p-sub{font-size:13px;color:#6A7080;margin-top:4px}
.goldbar{width:38px;height:3px;background:#D4A017;border-radius:2px;margin:10px 0 18px}
.seclab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#6A7080;margin-bottom:8px}
.quote-block{background:#13161C;border-left:3px solid #D4A017;border-radius:0 7px 7px 0;padding:11px 14px;margin-bottom:18px;font-size:13px;font-style:italic;color:#8A9AB0;line-height:1.6;display:flex;align-items:flex-start;gap:10px}
.quote-txt{flex:1}
.stage-card{background:#13161C;border:1px solid #1E2230;border-radius:7px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:4px;transition:border-color .15s}
.stage-card:hover{border-color:#2A3040}
.stage-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#3A4050;width:22px;flex-shrink:0;line-height:1}
.stage-body{flex:1;min-width:0}
.stage-title{font-size:13px;font-weight:500;color:#E8EAF0}
.stage-detail{font-size:11px;color:#6A7080;margin-top:2px;line-height:1.4}
.stage-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.stage-acts{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.stage-card:hover .stage-acts{opacity:1}
.pillar{background:#13161C;border:1px solid #1E2230;border-radius:8px;margin-bottom:8px;overflow:hidden}
.phead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s}
.phead:hover{background:#181C25}
.picon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.04em;color:#E8EAF0}
.pdesc{font-size:11px;color:#6A7080;margin-top:1px}
.pbody{padding:0 14px 12px;display:none}
.pbody.open{display:block}
.irow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #1E2230}
.irow:last-of-type{border-bottom:none}
.idot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.itext{font-size:13px;color:#E8EAF0;line-height:1.4;font-weight:500}
.isub{font-size:11px;color:#6A7080;margin-top:2px;line-height:1.4}
.iacts{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.irow:hover .iacts{opacity:1}
.xbtn{width:22px;height:22px;border-radius:5px;border:1px solid #1E2230;background:#0F1117;color:#6A7080;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.xbtn:hover{border-color:#2A3040;color:#C0C6D4}
.xbtn.del:hover{border-color:#6A1515;color:#FF7070;background:#200A0A}
.add-item{width:100%;margin-top:8px;padding:7px;border:1px dashed #1E2230;border-radius:6px;background:none;color:#6A7080;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.add-item:hover{border-color:#D4A017;color:#D4A017;background:#1A1508}
/* RANKS TAB */
.ranks-hero{margin-bottom:20px}
.ranks-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;letter-spacing:.02em;color:#E8EAF0;line-height:1}
.ranks-sub{font-size:13px;color:#6A7080;margin-top:4px}
.current-rank-card{background:linear-gradient(135deg,#1A1508,#13161C);border:1px solid #D4A017;border-radius:10px;padding:16px;margin-bottom:20px;text-align:center}
.cr-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#6A7080;margin-bottom:4px;font-weight:600}
.cr-rank{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:#D4A017;letter-spacing:.04em}
.cr-xp{font-size:12px;color:#6A7080;margin-top:4px}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:7px;border:1px solid #1E2230;background:#13161C;margin-bottom:4px;transition:border-color .15s}
.rank-row.current-row{border-color:#D4A017;background:#1A1508}
.rank-row.locked{opacity:.5}
.rank-row.unlocked{border-color:#1A4A1A}
.rank-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#3A4050;width:28px;flex-shrink:0;text-align:center}
.rank-num.current-row-num{color:#D4A017}
.rank-num.unlocked-num{color:#2E8B3A}
.rank-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.rank-body{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:500;color:#E8EAF0}
.rank-row.locked .rank-name{color:#4A5060}
.rank-xp{font-size:11px;color:#6A7080;margin-top:1px}
.rank-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;flex-shrink:0;white-space:nowrap}
.rs-current{background:#1A1508;color:#D4A017;border:1px solid #3A2A08}
.rs-done{background:#0A1A0A;color:#2E8B3A;border:1px solid #1A4A1A}
.rs-locked{background:#0F1117;color:#3A4050;border:1px solid #1E2230}
.tier-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#4A5060;margin:14px 0 6px;padding-left:2px}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#13161C;border-radius:10px;border:1px solid #2A3040;padding:20px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal h3{font-size:15px;font-weight:500;color:#E8EAF0;margin-bottom:14px}
.fg{margin-bottom:10px}
.fg label{font-size:11px;color:#6A7080;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;font-weight:500}
.fg input,.fg textarea,.fg select{width:100%;font-family:inherit;font-size:13px;background:#0F1117;border:1px solid #2A3040;border-radius:6px;color:#E8EAF0;padding:7px 9px;color-scheme:dark}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:#2A6FD4}
.fg textarea{resize:vertical;min-height:70px;line-height:1.5}
.fg select option{background:#13161C}
.frow{display:flex;gap:8px}.frow .fg{flex:1}
.macts{display:flex;gap:8px;margin-top:14px}
.msave{flex:1;padding:9px;border-radius:6px;border:none;background:#2A6FD4;color:#E8EAF0;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.msave:hover{background:#1A5FC4}
.mcancel{padding:9px 16px;border-radius:6px;border:1px solid #1E2230;background:none;color:#6A7080;font-size:13px;cursor:pointer;font-family:inherit}
/* XP EDIT MODAL */
.xp-edit-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1E2230}
.xp-edit-row:last-child{border-bottom:none}
.xp-edit-name{flex:1;font-size:13px;color:#E8EAF0}
.xp-edit-toggle{display:flex;align-items:center;gap:6px}
.xp-edit-val{width:52px;font-size:13px;background:#0F1117;border:1px solid #2A3040;border-radius:5px;color:#E8EAF0;padding:4px 6px;text-align:center;font-family:inherit;color-scheme:dark}
.xp-edit-val:focus{outline:none;border-color:#2A6FD4}
.xp-on-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.xp-on-toggle.on{background:#2E8B3A}
.xp-on-toggle.off{background:#2A3040}
.xp-on-toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.xp-on-toggle.on::after{left:18px}
.xp-on-toggle.off::after{left:2px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:#6A7080;font-size:13px}
.spinner{width:28px;height:28px;border:2px solid #1E2230;border-top-color:#2A6FD4;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.dayname{font-size:28px}.btimes{min-width:76px}.tstart{font-size:13px}}
[data-weekreset]:hover{border-color:#8A2020!important;background:#2A0808!important}
.todo-section{margin-top:20px;border-top:1px solid #1E2230;padding-top:16px}
.todo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.todo-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#6A7080}
.todo-add-row{display:flex;gap:6px;margin-bottom:8px}
.todo-input{flex:1;background:#0F1117;border:1px solid #2A3040;border-radius:6px;color:#E8EAF0;font-size:13px;padding:7px 10px;font-family:inherit;color-scheme:dark}
.todo-input:focus{outline:none;border-color:#2A6FD4}
.todo-add-btn{padding:7px 12px;border-radius:6px;border:none;background:#2A6FD4;color:#E8EAF0;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.todo-add-btn:hover{background:#1A5FC4}
.todo-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0F1117;border:1px solid #1E2230;border-radius:6px;margin-bottom:4px;transition:opacity .2s}
.todo-item.done-todo{opacity:.5}
.todo-chk{width:20px;height:20px;border-radius:50%;border:2px solid #2A3040;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;color:transparent;font-size:11px}
.todo-chk:hover{border-color:#2E8B3A}
.todo-chk.ticked{background:#2E8B3A;border-color:#2E8B3A;color:#fff}
.todo-text{flex:1;font-size:13px;color:#E8EAF0;line-height:1.4}
.todo-item.done-todo .todo-text{text-decoration:line-through;color:#3A4050}
.todo-del{width:20px;height:20px;border-radius:4px;border:none;background:none;color:#3A4050;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:color .15s;flex-shrink:0}
.todo-del:hover{color:#FF7070}
.todo-empty{font-size:12px;color:#3A4050;text-align:center;padding:12px 0;font-style:italic}
.todo-reset-btn{padding:4px 10px;border-radius:5px;border:1px solid #2A1515;background:#150808;color:#FF7070;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.todo-reset-btn:hover{border-color:#6A1515;background:#200A0A}
</style>

// ── STATE ────────────────────────────────────────────────────────
let sched=null,path=null;
let xpData={totalXP:750,lastDate:'',streak:0,checks:{},blockSettings:{}};
// blockSettings: { blockId: { enabled: bool, points: number } }
// todoData: { "mon": [{id, text, done}], "tue": [...], ... }
let todoData={mon:[],tue:[],wed:[],thu:[],fri:[],sat:[],sun:[]};
let curDay=0,activeTab='mon',satTeam='1st';
let swapIdx=null,tpIdx=null,syncStatus='synced';
let ignoreNext=false;
const DAY_TABS=[{short:'Mon',tab:'mon',idx:0},{short:'Tue',tab:'tue',idx:1},{short:'Wed',tab:'wed',idx:2},{short:'Thu',tab:'thu',idx:3},{short:'Fri',tab:'fri',idx:4},{short:'Sat',tab:'sat',idx:5},{short:'Sun',tab:'sun',idx:7}];

function getDay(){if(activeTab!=='sat')return sched[curDay];return satTeam==='1st'?sched[5]:sched[6];}
function getBlocks(){return getDay().blocks;}

// ── BLOCK XP SETTINGS ────────────────────────────────────────────
function blockEnabled(b){
  const s=xpData.blockSettings[b.id];
  if(s!==undefined)return s.enabled;
  return XP_CATS_DEFAULT[b.cat]!==undefined?XP_CATS_DEFAULT[b.cat]:false;
}
function blockPoints(b){
  const s=xpData.blockSettings[b.id];
  if(s!==undefined&&s.points!==undefined)return s.points;
  return XP_PTS_DEFAULT[b.cat]||5;
}
function setBlockEnabled(blockId,val){
  if(!xpData.blockSettings[blockId])xpData.blockSettings[blockId]={};
  xpData.blockSettings[blockId].enabled=val;
}
function setBlockPoints(blockId,val){
  if(!xpData.blockSettings[blockId])xpData.blockSettings[blockId]={};
  xpData.blockSettings[blockId].points=val;
}

// ── XP HELPERS ───────────────────────────────────────────────────
function todayChecks(){return xpData.checks[today()]||{};}
function isChecked(blockId){return !!todayChecks()[blockId];}
function todayXP(){
  const ch=todayChecks();
  let sum=0;
  for(const day of sched){for(const b of day.blocks){if(ch[b.id]&&blockEnabled(b))sum+=blockPoints(b);}}
  return sum;
}

// ── FIREBASE ─────────────────────────────────────────────────────
function setSS(s){
  syncStatus=s;
  const dot=document.getElementById('sd'),lbl=document.getElementById('sl');
  if(!dot||!lbl)return;
  dot.className='sync-dot'+(s==='saving'?' saving':s==='syncing'?' syncing':s==='error'?' error':'');
  lbl.textContent=s==='saving'?'Saving…':s==='syncing'?'Syncing…':s==='error'?'Sync error':'Live — all devices synced';
}
async function saveFull(){setSS('saving');ignoreNext=true;try{await Promise.all([setDoc(SCHED_DOC,{data:JSON.stringify(sched)}),setDoc(PATH_DOC,{data:JSON.stringify(path)}),setDoc(XP_DOC,{data:JSON.stringify(xpData)})]);setSS('synced');}catch(e){setSS('error');}setTimeout(()=>{ignoreNext=false;},2000);}
async function saveXP(){setSS('saving');ignoreNext=true;try{await setDoc(XP_DOC,{data:JSON.stringify(xpData)});setSS('synced');}catch(e){setSS('error');}setTimeout(()=>{ignoreNext=false;},2000);}
async function saveSched(){setSS('saving');ignoreNext=true;try{await setDoc(SCHED_DOC,{data:JSON.stringify(sched)});setSS('synced');}catch(e){setSS('error');}setTimeout(()=>{ignoreNext=false;},2000);}
async function saveTodo(){setSS('saving');ignoreNext=true;try{await setDoc(TODO_DOC,{data:JSON.stringify(todoData)});setSS('synced');}catch(e){setSS('error');}setTimeout(()=>{ignoreNext=false;},2000);}
async function savePath(){setSS('saving');ignoreNext=true;try{await setDoc(PATH_DOC,{data:JSON.stringify(path)});setSS('synced');}catch(e){setSS('error');}setTimeout(()=>{ignoreNext=false;},2000);}

function setupListeners(){
  onSnapshot(SCHED_DOC,snap=>{if(ignoreNext)return;if(snap.exists()){const p=JSON.parse(snap.data().data);if(p&&p.length===8&&p[6]?.is2ndXV){sched=p;setSS('syncing');setTimeout(()=>{render();setSS('synced');},100);}}});
  onSnapshot(PATH_DOC,snap=>{if(ignoreNext)return;if(snap.exists()){const p=JSON.parse(snap.data().data);if(p&&p.pillars){path=p;setSS('syncing');setTimeout(()=>{render();setSS('synced');},100);}}});
  onSnapshot(XP_DOC,snap=>{if(ignoreNext)return;if(snap.exists()){const p=JSON.parse(snap.data().data);if(p){xpData=p;setSS('syncing');setTimeout(()=>{render();setSS('synced');},100);}}});
  onSnapshot(TODO_DOC,snap=>{if(ignoreNext)return;if(snap.exists()){const p=JSON.parse(snap.data().data);if(p){todoData=p;setSS('syncing');setTimeout(()=>{render();setSS('synced');},100);}}});
}

// ── RENDER ───────────────────────────────────────────────────────
function linkify(text){
  if(!text)return'';
  // Escape HTML first
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Then make URLs clickable
  return esc.replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:#5A9AF0;text-decoration:underline;word-break:break-all" onclick="event.stopPropagation()">$1</a>');
}
function render(){
  const app=document.getElementById('app');
  if(!sched||!path){app.innerHTML='<div class="loading-screen"><div class="spinner"></div><span>Loading…</span></div>';return;}
  let body='';
  if(activeTab==='pathway') body=rPath();
  else if(activeTab==='ranks') body=rRanks();
  else body=rSched();
  app.innerHTML=rTopbar()+rNav()+'<div class="wrap">'+body+'</div>'+(swapIdx!==null&&activeTab!=='pathway'&&activeTab!=='ranks'?rSwapBar():'');
  setSS(syncStatus);
  attachHandlers();
}

function attachHandlers(){
  // NAV
  const nav=document.getElementById('mainnav');
  if(nav) nav.onclick=e=>{
    const btn=e.target.closest('[data-nav]');
    if(!btn)return;
    const tab=btn.dataset.nav,idx=parseInt(btn.dataset.idx||0);
    if(tab==='pathway'){activeTab='pathway';swapIdx=null;render();}
    else if(tab==='ranks'){activeTab='ranks';swapIdx=null;render();}
    else{activeTab=tab;curDay=idx;swapIdx=null;render();}
  };
  // SWAP BAR
  const sb=document.querySelector('[data-cswap]');
  if(sb) sb.onclick=()=>{swapIdx=null;render();};
  // WRAP — single delegated listener for everything inside
  const wrap=document.querySelector('.wrap');
  if(!wrap)return;
  wrap.onclick=e=>{
    // time popup
    const tp=e.target.closest('[data-timepop]');
    if(tp){otp(parseInt(tp.dataset.timepop));return;}
    // checkbox
    const chk=e.target.closest('[data-chk]');
    if(chk){toggleCheck(chk.dataset.chk);return;}
    // xp edit
    const xpe=e.target.closest('[data-xpedit]');
    if(xpe){e.stopPropagation();openXpEdit(xpe.dataset.xpedit,xpe.dataset.xpname,parseInt(xpe.dataset.xppts),xpe.dataset.xpen==='true');return;}
    // swap
    const sw=e.target.closest('[data-swap]');
    if(sw){hs(parseInt(sw.dataset.swap));return;}
    // edit block
    const ed=e.target.closest('[data-edit]');
    if(ed){e.stopPropagation();obe(parseInt(ed.dataset.edit));return;}
    // delete block
    const dl=e.target.closest('[data-del]');
    if(dl){dblk(parseInt(dl.dataset.del));return;}
    // add block
    if(e.target.closest('[data-addbtn]')){oba();return;}
    // team switch
    const ts=e.target.closest('[data-team]');
    if(ts){satTeam=ts.dataset.team;swapIdx=null;render();return;}
    // pillar toggle
    const ph=e.target.closest('[data-pillar]');
    if(ph && !e.target.closest('[data-edititem],[data-delitem],[data-additem]')){tpl(parseInt(ph.dataset.pillar));return;}
    // edit quote
    if(e.target.closest('[data-editquote]')){e.stopPropagation();eqt();return;}
    // edit stage
    const est2=e.target.closest('[data-editstage]');
    if(est2){e.stopPropagation();est(parseInt(est2.dataset.editstage));return;}
    // del stage
    const dst2=e.target.closest('[data-delstage]');
    if(dst2){dst(parseInt(dst2.dataset.delstage));return;}
    // add stage
    if(e.target.closest('[data-addstage]')){ast();return;}
    // edit item
    const eit2=e.target.closest('[data-edititem]');
    if(eit2){e.stopPropagation();eit(parseInt(eit2.dataset.pi),parseInt(eit2.dataset.ii));return;}
    // del item
    const dit2=e.target.closest('[data-delitem]');
    if(dit2){dit(parseInt(dit2.dataset.pi),parseInt(dit2.dataset.ii));return;}
    // add item
    const ait2=e.target.closest('[data-additem]');
    if(ait2){ait(parseInt(ait2.dataset.additem));return;}
    // add pillar
    if(e.target.closest('[data-addpillar]')){apl();return;}
    // edit pillar
    const epl2=e.target.closest('[data-editpillar]');
    if(epl2){e.stopPropagation();epl(parseInt(epl2.dataset.editpillar));return;}
    // delete pillar
    const dpl2=e.target.closest('[data-delpillar]');
    if(dpl2){e.stopPropagation();dpl(parseInt(dpl2.dataset.delpillar));return;}
    // weekly reset (ticks)
    if(e.target.closest('[data-weekreset]')){weekReset();return;}
    // weekly reset (todos)
    if(e.target.closest('[data-todoresetall]')){resetAllTodos();return;}
    // todo: add button
    const ta=e.target.closest('[data-todoadd]');
    if(ta){addTodo(ta.dataset.todoadd);return;}
    // todo: toggle check
    const tc=e.target.closest('[data-todochk]');
    if(tc){toggleTodo(tc.dataset.todochk,parseInt(tc.dataset.ti));return;}
    // todo: delete item
    const tdl=e.target.closest('[data-tododl]');
    if(tdl){deleteTodo(tdl.dataset.tododl,parseInt(tdl.dataset.ti));return;}
    // todo: clear done
    const tr=e.target.closest('[data-todoreset]');
    if(tr){clearDoneTodos(tr.dataset.todoreset);return;}
  };
}

function rTopbar(){return`<div class="topbar"><div class="logo"><span class="logo-badge">10</span>JERSEY PLAN</div><div class="sync-row"><div class="sync-dot" id="sd"></div><span id="sl">Live — all devices synced</span></div></div>`;}
function rNav(){
  const t=DAY_TABS.map(t=>`<button class="ntab${activeTab===t.tab?' active':''}" data-nav="${t.tab}" data-idx="${t.idx}">${t.short}${t.tab==='sat'?'<span class="gamedot"></span>':''}</button>`).join('');
  return`<nav class="mainnav" id="mainnav">${t}<button class="ntab${activeTab==='pathway'?' active':''}" data-nav="pathway">Pathway</button><button class="ntab${activeTab==='ranks'?' active':''}" data-nav="ranks">Ranks</button></nav>`;
}

function rXPCard(){
  const xp=xpData.totalXP;
  const cr=currentRank(xp),nr=nextRank(xp);
  const toNext=nr?nr.xp-xp:0;
  const fromCur=nr?xp-cr.xp:0;
  const range=nr?nr.xp-cr.xp:1;
  const prog=nr?Math.round((fromCur/range)*100):100;
  const txp=todayXP();
  const B=getBlocks();
  const xpBlocks=B.filter(b=>blockEnabled(b));
  const doneCount=xpBlocks.filter(b=>isChecked(b.id)).length;
  const dots=B.map(b=>{const en=blockEnabled(b),done=isChecked(b.id);return`<div class="dp-dot${done?' done':!en?' noxp':''}"></div>`;}).join('');
  return`<div class="xp-card">
    <div class="xp-top">
      <div class="xp-level">${cr.icon} ${cr.name}</div>
      <div class="xp-streak">🔥<span>${xpData.streak}</span>day streak</div>
    </div>

function showToast(msg,isLvl=false){
  const t=document.createElement('div');t.className=isLvl?'lvlup-toast':'xp-toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),isLvl?2900:1900);
}

window.toggleCheck=blockId=>{
  const t=today();
  if(!xpData.checks[t])xpData.checks[t]={};
  const wasDone=xpData.checks[t][blockId];
  // Find block
  let theBlock=null;
  for(const day of sched){for(const b of day.blocks){if(b.id===blockId){theBlock=b;break;}}}
  if(!theBlock)return;
  const en=blockEnabled(theBlock),pts=blockPoints(theBlock);
  if(wasDone){
    xpData.checks[t][blockId]=false;
    if(en)xpData.totalXP=Math.max(0,xpData.totalXP-pts);
  }else{
    xpData.checks[t][blockId]=true;
    if(en){
      const prevR=currentRank(xpData.totalXP);
      xpData.totalXP+=pts;
      const newR=currentRank(xpData.totalXP);
      const yd=new Date();yd.setDate(yd.getDate()-1);const ydStr=yd.toISOString().slice(0,10);
      if(xpData.lastDate!==t){xpData.streak=(xpData.lastDate===ydStr)?xpData.streak+1:1;xpData.lastDate=t;}
      if(newR.name!==prevR.name)setTimeout(()=>showToast('🏆 RANK UP! '+newR.icon+' '+newR.name,true),200);
      else showToast('+'+pts+' XP');
    }
  }
  saveXP();render();
};

window.openXpEdit=(blockId,blockName,curPts,curEnabled)=>{
  // Use a dedicated modal to avoid boolean coercion issues with generic showMod
  const ov=document.createElement('div');ov.className='overlay';ov.id='mo';

  const noSelected=curEnabled?'':'selected';
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <h3>XP Settings</h3>
    <div style="font-size:13px;color:#6A7080;margin-bottom:14px">${blockName}</div>
    <div class="fg">
      <label>Award XP for this task</label>
      <select id="xp_en">
        <option value="yes" ${yesSelected}>Yes — earns XP</option>
        <option value="no" ${noSelected}>No — no XP</option>
      </select>
    </div>
    <div class="fg">
      <label>XP Points</label>
      <input type="number" id="xp_pts" value="${curPts}" min="1" max="200" placeholder="e.g. 20">
    </div>
    <div class="macts">
      <button class="msave" id="xp-save-btn">Save</button>
      <button class="mcancel" id="xp-cancel-btn">Cancel</button>

  document.body.appendChild(ov);
  setTimeout(()=>{

      const enEl=document.getElementById('xp_en');

function addTodo(key){
  const inp=document.getElementById('todo-inp-'+key);
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  if(!todoData[key])todoData[key]=[];
  todoData[key].push({id:'td-'+Date.now(),text,done:false});
  inp.value='';
  saveTodo();render();
  // Re-focus input after render
  setTimeout(()=>{const el=document.getElementById('todo-inp-'+key);if(el)el.focus();},50);
}
function toggleTodo(key,ti){
  if(!todoData[key])return;
  todoData[key][ti].done=!todoData[key][ti].done;
  saveTodo();render();
}
function deleteTodo(key,ti){
  if(!todoData[key])return;
  todoData[key].splice(ti,1);
  saveTodo();render();
}
function clearDoneTodos(key){
  if(!todoData[key])return;
  todoData[key]=todoData[key].filter(t=>!t.done);
  saveTodo();render();
}
function resetAllTodos(){
  if(!confirm('Clear all to-do lists for every day?\n\nThis removes all tasks from every day\'s list.'))return;
  todoData={mon:[],tue:[],wed:[],thu:[],fri:[],sat:[],sat2:[],sun:[]};
  saveTodo();
  showToast('All to-do lists cleared 📋');
  render();
}

// ── WEEKLY RESET ─────────────────────────────────────────────────
function weekReset(){
  if(!confirm('Reset checkmarks for a fresh week?\n\nYour total XP and rank are PERMANENT — only the ticks clear so you can earn XP again. You can do this as many times as you want.'))return;
  // Clear all past check dates entirely — XP total is untouched
  xpData.checks={};
  saveXP();
  showToast('Fresh week! All ticks cleared 🔄');
  render();
}

// ── MODAL ────────────────────────────────────────────────────────
function catOpts(){return[{v:'routine',l:'Routine'},{v:'team',l:'Team Training'},{v:'gym',l:'Gym'},{v:'kick',l:'Kicking'},{v:'sprint',l:'Sprint'},{v:'stretch',l:'Stretch / Recovery'},{v:'free',l:'Free Time'},{v:'sleep',l:'Sleep / Wind Down'},{v:'game',l:'Game Day'}];}
function showMod(title,fields,onSave){
  cmModal(); // close any existing modal first
  const ov=document.createElement('div');ov.className='overlay';ov.id='mo';
  const fieldHtml=fields.map(f=>{
    let inp='';
    if(f.type==='textarea') inp=`<textarea id="mf_${f.id}" style="color-scheme:dark">${f.val||''}</textarea>`;
    else if(f.type==='select') inp=`<select id="mf_${f.id}" style="color-scheme:dark">${(f.opts||[]).map(o=>`<option value="${o.v}"${o.v===f.val?' selected':''}>${o.l}</option>`).join('')}</select>`;
    else inp=`<input type="${f.type||'text'}" id="mf_${f.id}" value="${f.val||''}" placeholder="${f.ph||''}" style="color-scheme:dark">`;
    return`<div class="fg"><label>${f.label}</label>${inp}</div>`;
  }).join('');
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><h3>${title}</h3>${fieldHtml}<div class="macts"><button class="msave" id="modal-save-btn">Save</button><button class="mcancel" onclick="cmModal()">Cancel</button></div></div>`;
  document.body.appendChild(ov);
  // Attach save handler directly to button — avoids window._ms string-eval issues
  document.getElementById('modal-save-btn').addEventListener('click', onSave);
  setTimeout(()=>{
    ov.addEventListener('click',e=>{if(e.target===ov)cmModal();});
    const f=document.querySelector('#mo input:not([type=time]),#mo textarea');if(f)f.focus();
  },50);
}
window.cmModal=()=>{const o=document.getElementById('mo');if(o)o.remove();};
function gf(id){const el=document.getElementById('mf_'+id);return el?el.value.trim():'';}
document.addEventListener('click',e=>{if(tpIdx!==null){const tp=document.getElementById('tp'+tpIdx),blk=document.getElementById('blk'+tpIdx);if(tp&&!tp.contains(e.target)&&blk&&!blk.querySelector('.btimes').contains(e.target))ctp();}});

// ── AUTO-REFRESH (checks for new version every 10 min) ───────────
let currentBuild=null;
async function checkForUpdate(){
  try{
    const snap=await getDoc(BUILD_DOC);
    if(snap.exists()){
      const v=snap.data().version;
      if(currentBuild===null){currentBuild=v;}
      else if(v!==currentBuild){
        console.log('New version available:',v);
        // Show a subtle refresh banner
        const existing=document.getElementById('update-banner');
        if(!existing){
          const b=document.createElement('div');
          b.id='update-banner';
          b.style.cssText='position:fixed;top:52px;left:0;right:0;background:#1A1508;border-bottom:1px solid #D4A017;padding:8px 16px;font-size:12px;color:#D4A017;text-align:center;z-index:200;cursor:pointer';
          b.textContent='🔄 New update available — tap to refresh';
          b.onclick=()=>location.reload();
          document.body.appendChild(b);
        }
      }
    }
  }catch(e){}
}

// ── INIT ─────────────────────────────────────────────────────────
async function init(){
  try{
    const[sdS,pdS,xpS]=await Promise.all([getDoc(SCHED_DOC),getDoc(PATH_DOC),getDoc(XP_DOC)]);
    const fresh=makeDefaultSched();
    if(sdS.exists()){const p=JSON.parse(sdS.data().data);sched=(p&&p.length===8&&p[6]?.is2ndXV)?p:fresh;}
    else{sched=fresh;await setDoc(SCHED_DOC,{data:JSON.stringify(sched)});}
    if(pdS.exists()){const p=JSON.parse(pdS.data().data);path=(p&&p.pillars)?p:deepClone(DEFAULT_PATH);}
    else{path=deepClone(DEFAULT_PATH);await setDoc(PATH_DOC,{data:JSON.stringify(path)});}
    if(xpS.exists()){const p=JSON.parse(xpS.data().data);if(p){xpData=p;if(!xpData.blockSettings)xpData.blockSettings={};if(xpData.totalXP<750)xpData.totalXP=750;}}
    else{await setDoc(XP_DOC,{data:JSON.stringify(xpData)});}
    const tdS=await getDoc(TODO_DOC);
    if(tdS.exists()){const p=JSON.parse(tdS.data().data);if(p)todoData=p;}
    else{await setDoc(TODO_DOC,{data:JSON.stringify(todoData)});}
    render();setupListeners();
    // Push build version so other devices get refresh banner
    try{await setDoc(BUILD_DOC,{version:'2025-pathway-edit-links'});}catch(e){}
    checkForUpdate();setInterval(checkForUpdate,600000);
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="loading-screen"><span style="color:#FF7070">Firebase error: ${e.message}</span></div>`;
  }
}
init();
